name: sol-cron daily update

on:
    schedule:
        - cron: '30 6 * * *'
    workflow_dispatch: 

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
    contents: write

jobs:
    track-sun:
        runs-on: ubuntu-latest

        steps:
            - name: checkout repo
              uses: actions/checkout@v4.2.2
            
            - name: setup python
              uses: actions/setup-python@v5.4.0
              with:
                python-version: '3.10'
            
            - name: install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install astral
            
            - name: execute sol-cron script
              run: python sol-cron.py

            - name: commit and push changes
              run: |
                git config --global user.name "sol-cron-bot"
                git config --global user.email "action@github.com"
                git add templaate.svg
                git commit -m "sol-cron: relogged sun position for $(date + '%d-%m-%Y')" || echo "no changes to commit"
                git push